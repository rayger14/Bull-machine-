name: liquidity_compression
display_name: Liquidity Compression
aliases:
- E
- compression
direction: long
fusion_weights:
  wyckoff: 0.2
  liquidity: 0.5
  momentum: 0.15
  smc: 0.15
thresholds:
  fusion_threshold: 0.18
  liquidity_min: 0.25
  liquidity_max: 0.7
  liquidity_score_min: 0.25
  liquidity_imbalance_max: 6.0
  atr_pctile: 0.35
  fusion: 0.18
  cooling_period_bars: 24
hard_gates:
- feature: atr_percentile
  op: max
  value: 0.35
  nan_policy: skip
  description: Low ATR (compression)
- feature: liquidity_score
  op: in_range
  value:
  - 0.25
  - 0.7
  description: Liquidity in compression band
gate_mode: soft
exit_logic:
  max_hold_hours: 120
  scale_out_enabled: true
  scale_out_levels:
  - 0.5
  - 1.0
  - 2.0
  scale_out_pcts:
  - 0.2
  - 0.3
  - 0.4
  runner_pct: 0.10
  runner_trailing_atr: 2.5
  trailing_start_r: 0.5
  trailing_atr_mult: 2.0
position_sizing:
  risk_per_trade_pct: 0.02
  max_position_size_pct: 0.1
  atr_stop_mult: 2.7
  atr_tp_mult: 5.2
regime_preferences:
  risk_on: 1.1
  neutral: 1.2
  risk_off: 0.9
  crisis: 0.7
allowed_regimes: []
description: Low ATR + narrow range + stable book depth. Compression before expansion.
priority: 10
enabled: true
