  runner_trailing_atr: 2.0
  trailing_start_r: 0.5
  trailing_atr_mult: 1.5
position_sizing:
  risk_per_trade_pct: 0.02
  max_position_size_pct: 0.1
  atr_stop_mult: 3.3
  atr_tp_mult: 4.7
regime_preferences:
  risk_on: 1.3
  neutral: 1.0
  risk_off: 0.7
  crisis: 0.5
allowed_regimes: []
description: Low ATR + near POC + BOMS strength. High-quality coil breakout pattern.
priority: 11
enabled: true
