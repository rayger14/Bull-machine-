name: failed_continuation
display_name: Failed Continuation
aliases:
- D
- failed_fvg
direction: long
fusion_weights:
  wyckoff: 0.25
  liquidity: 0.25
  momentum: 0.35
  smc: 0.15
thresholds:
  fusion_threshold: 0.18
  rsi_min: 55.0
  rsi_max: 55.0
  momentum_min: 0.1
  fusion: 0.18
  cooling_period_bars: 24
hard_gates:
- feature: derived:any_fvg
  op: bool_true
  nan_policy: skip
  description: FVG must be present
- feature: rsi_14
  op: max
  value: 55
  description: RSI must be weak
- feature: volume_zscore
  op: max
  value: 3.5
  nan_policy: fail
  description: Volume fading (failed continuation needs declining volume)
- feature: effort_result_ratio
  op: max
  value: 1.4
  nan_policy: skip
  description: Low effort-to-result confirms failing move
- feature: rsi_divergence
  op: min
  value: 0.1
  nan_policy: skip
  description: Bullish RSI divergence confirms failed bearish continuation
- feature: chop_score
  op: max
  value: 0.25
  nan_policy: skip
  description: Low chop required - failed continuations in choppy markets stop out (backtest PF 1.94->2.51)
gate_mode: hard
exit_logic:
  max_hold_hours: 96
  scale_out_enabled: true
  scale_out_levels:
  - 0.5
  - 1.0
  - 1.5
  scale_out_pcts:
  - 0.25
  - 0.35
  - 0.3
  runner_pct: 0.0
  runner_trailing_atr: 2.0
  trailing_start_r: 0.5
  trailing_atr_mult: 1.5
position_sizing:
  risk_per_trade_pct: 0.02
  max_position_size_pct: 0.1
  atr_stop_mult: 3.0
  atr_tp_mult: 5.8
regime_preferences:
  risk_on: 1.2
  neutral: 1.0
  risk_off: 0.8
  crisis: 0.6
allowed_regimes: []
description: FVG present + weak RSI + falling ADX. Failed bearish continuation reversal.
priority: 8
enabled: true
