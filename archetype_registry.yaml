  - id: S1
    name: "Liquidity Vacuum Reversal"
    slug: "liquidity_vacuum"
    class: "engine.strategies.archetypes.bear.LiquidityVacuumArchetype"
    maturity: production
    direction: long  # Counter-trend reversal
    regime_tags:
      - risk_off
      - crisis
    requires_engines:
      - liquidity
      - wyckoff
      - macro
    requires_features:
      critical:
        - liquidity_score
        - liquidity_drain_pct
        - volume_zscore
        - wick_lower_ratio
      recommended:
        - VIX_Z
        - DXY_Z
        - funding_Z
        - crisis_composite
      optional:
        - capitulation_depth
        - liquidity_velocity
        - liquidity_persistence
    enable_flag: enable_S1
    description: |
      Capitulation reversal during liquidity vacuum conditions.
      Detects extreme orderbook drain + panic selling + wick rejection.
      Key signals: Liquidity drained >30% below 7d avg, volume panic z>2.0, deep lower wick >30%.
      Target: 10-15 trades/year, PF > 2.0 in bear markets.

      Historical Examples:
      - 2022-06-18: LUNA capitulation → -44% liquidity drain → violent 25% bounce
      - 2022-11-09: FTX collapse → liquidity vacuum → explosive reversal
      - 2022-05-12: LUNA death spiral → extreme capitulation → sharp bounce
    historical_performance:
      backtest_period: "2022-2024"
      total_trades: 34
      win_rate: 0.68
      profit_factor: 2.34
      sharpe_ratio: 1.82
      avg_hold_hours: 48
      max_drawdown_pct: -8.2

