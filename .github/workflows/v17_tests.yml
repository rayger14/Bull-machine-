name: Engine Validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'engine/**'
      - 'configs/**'
      - 'bin/**'

jobs:
  validate-engine:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scipy scikit-learn pyyaml

    - name: Validate engine module structure
      run: |
        python -c "
        import importlib, sys
        modules = [
            'engine.archetypes.archetype_instance',
            'engine.archetypes.logic',
            'engine.archetypes.logic_v2_adapter',
            'engine.archetypes.exit_logic',
            'engine.archetypes.threshold_policy',
            'engine.config.archetype_config_loader',
            'engine.context.regime_service',
            'engine.integrations.isolated_archetype_engine',
            'engine.smc.bos',
            'engine.wyckoff.events',
        ]
        failed = []
        for mod in modules:
            try:
                importlib.import_module(mod)
            except Exception as e:
                failed.append(f'{mod}: {e}')
        if failed:
            for f in failed:
                print(f'FAIL: {f}')
            sys.exit(1)
        print(f'All {len(modules)} engine modules import OK')
        "

    - name: Validate archetype config loader
      run: |
        python -c "
        from engine.config.archetype_config_loader import load_archetype_configs
        configs = load_archetype_configs('configs/archetypes')
        print(f'Loaded {len(configs)} archetype configs')
        for name, cfg in sorted(configs.items()):
            direction = cfg.get('direction', 'unknown')
            enabled = cfg.get('enabled', False)
            gates = len(cfg.get('hard_gates', []))
            print(f'  {name}: direction={direction}, enabled={enabled}, hard_gates={gates}')
        assert len(configs) >= 10, f'Expected 10+ archetypes, got {len(configs)}'
        "

  validate-architecture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Check directory structure
      run: |
        test -d engine/archetypes || { echo "Missing engine/archetypes"; exit 1; }
        test -d engine/integrations || { echo "Missing engine/integrations"; exit 1; }
        test -d engine/config || { echo "Missing engine/config"; exit 1; }
        test -d engine/smc || { echo "Missing engine/smc"; exit 1; }
        test -d engine/wyckoff || { echo "Missing engine/wyckoff"; exit 1; }
        test -d configs/archetypes || { echo "Missing configs/archetypes"; exit 1; }
        test -d deploy || { echo "Missing deploy"; exit 1; }
        echo "Architecture structure validated"

    - name: Check required files
      run: |
        test -f engine/archetypes/archetype_instance.py
        test -f engine/config/archetype_config_loader.py
        test -f engine/integrations/isolated_archetype_engine.py
        test -f bin/backtest_v11_standalone.py
        test -f bin/live/coinbase_runner.py
        test -f bin/live/live_feature_computer.py
        test -f configs/bull_machine_isolated_v11_fixed.json
        test -f deploy/deploy.sh
        echo "Required files present"
