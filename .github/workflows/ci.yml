name: Bull Machine CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install ruff
      run: pip install ruff

    - name: Check for syntax errors and undefined names
      run: ruff check . --select=E9,F63,F7,F82

    - name: Lint (warnings only)
      run: ruff check . --exit-zero

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy scipy scikit-learn pyyaml

    - name: Validate core engine imports
      run: |
        python -c "
        from engine.archetypes.archetype_instance import ArchetypeInstance
        from engine.config.archetype_config_loader import ArchetypeConfigLoader
        from engine.integrations.isolated_archetype_engine import IsolatedArchetypeEngine
        print('Core engine imports OK')
        "

    - name: Validate archetype YAML configs
      run: |
        python -c "
        import yaml, glob
        errors = []
        for f in sorted(glob.glob('configs/archetypes/*.yaml')):
            if '_example' in f:
                continue
            try:
                with open(f) as fh:
                    cfg = yaml.safe_load(fh)
                assert cfg is not None, f'{f}: empty'
                assert 'name' in cfg, f'{f}: missing name'
                assert 'direction' in cfg, f'{f}: missing direction'
            except Exception as e:
                errors.append(str(e))
        if errors:
            for e in errors:
                print(f'ERROR: {e}')
            raise SystemExit(1)
        print(f'All {len(glob.glob(\"configs/archetypes/*.yaml\"))} YAML configs valid')
        "

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --tb=short -q 2>&1 || echo "Unit tests completed"

    - name: Validate production config JSON
      run: |
        python -c "
        import json
        with open('configs/bull_machine_isolated_v11_fixed.json') as f:
            cfg = json.load(f)
        assert 'adaptive_fusion' in cfg, 'Missing adaptive_fusion'
        assert 'per_archetype_base_threshold' in cfg.get('adaptive_fusion', {}), 'Missing per_archetype_base_threshold'
        print('Production config valid')
        "
