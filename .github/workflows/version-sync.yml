name: Version Sync Check
on:
  pull_request:
    branches: [main]

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON configs
        run: |
          echo "Checking JSON config syntax..."
          for f in configs/*.json configs/optimized/*.json; do
            python3 -c "import json; json.load(open('$f'))" 2>&1 || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All JSON configs valid"

      - name: Check for sensitive files
        run: |
          echo "Checking for sensitive files..."
          SENSITIVE=$(find . -name ".env" -o -name ".env.local" -o -name "*.pem" -o -name "*.key" | grep -v ".gitignore" | grep -v ".env.example" | grep -v ".env.coinbase.template" || true)
          if [ ! -z "$SENSITIVE" ]; then
            echo "WARNING: Potentially sensitive files found:"
            echo "$SENSITIVE"
          else
            echo "No sensitive files found"
          fi
